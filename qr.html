<!DOCTYPE html>
<html>
<head>
<title>QR</title>

<style>
body{
margin:0;
background:black;
color:red;
font-family:monospace;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

h1{font-size:40px;}

img{
width:95vw;
max-width:600px;
margin-top:30px;
border:6px solid red;
background:white;
padding:10px;
}

.footer{
position:absolute;
bottom:10px;
}
</style>
</head>

<body>

<h1>☠️ QR CODE ☠️</h1>
<p id="status">LOADING...</p>

<img id="qr">

<div class="footer">POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</div>

<script>
async function load(){
let res=await fetch("https://the-pain-md-session-id-zjus.onrender.com/qr");
let data=await res.json();

document.getElementById("qr").src=data.qr;
document.getElementById("status").innerText=data.message;
}
load();
</script>

</body>
</html>
