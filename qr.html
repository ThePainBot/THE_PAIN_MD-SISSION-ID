<!DOCTYPE html>
<html>
<head>
<title>QR</title>
<style>
body{
background:black;
color:red;
font-family:monospace;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
img{
width:250px;
}
</style>
</head>

<body>

<div>
<h2>QR CODE</h2>
<p id="status">Loading...</p>
<img id="qr">
</div>

<script>
async function load(){
let res=await fetch("https://the-pain-md-session-id-zjus.onrender.com/qr");
let data=await res.json();

document.getElementById("qr").src=data.qr;
document.getElementById("status").innerText=data.message;
}

load();
</script>

</body>
</html>
