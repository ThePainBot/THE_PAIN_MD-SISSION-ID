<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>THE PAIN MD</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at top, #2b0000, #050505);
  background-size: 300% 300%;
  animation: bgMove 12s ease infinite;
  color: red;
  font-family: monospace;
  text-align: center;
}

@keyframes bgMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:1;
  pointer-events:none;
}

.container {
  position: relative;
  z-index:2;
  margin-top:100px;
}

button {
  padding:12px;
  margin:10px;
  background:black;
  border:1px solid red;
  color:red;
  cursor:pointer;
}

button:hover {
  background:red;
  color:black;
}

.glitch {
  font-size:30px;
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { text-shadow:2px 0 red; }
  50% { text-shadow:-2px 0 white; }
  100% { text-shadow:2px 0 red; }
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div class="container">
<h1 class="glitch">☠️ THE PAIN MD ☠️</h1>

<button onclick="location.href='qr.html'">QR CODE</button>
<button onclick="location.href='pair.html'">PAIR CODE</button>

<button onclick="window.open('https://github.com/The-Pain-01/The-Pain')">GITHUB</button>
<button onclick="window.open('https://whatsapp.com/channel/0029Vb7FTvDICVfgeK27ul2S')">CHANNEL</button>

<p>☠️ SYSTEM ACTIVE ☠️</p>
</div>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "THE PAIN ☠ ۞ 000 ᯽";
const matrix = letters.split("");

const font_size = 14;
const columns = canvas.width / font_size;
const drops = [];

for(let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff0000";
  ctx.font = font_size + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = matrix[Math.floor(Math.random()*matrix.length)];
    ctx.fillText(text, i*font_size, drops[i]*font_size);

    if(drops[i]*font_size > canvas.height && Math.random()>0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 35);
</script>

</body>
</html>
