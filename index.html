<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PAIN MD</title>

<style>
body{
margin:0;
background:black;
color:red;
font-family:monospace;
overflow:hidden;
}

/* MATRIX */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CENTER */
.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* TITLE */
h1{
font-size:38px;
text-shadow:0 0 20px red;
}

/* BUTTON */
.btn{
width:280px;
padding:16px;
margin:10px;
font-size:18px;
border:2px solid red;
background:black;
color:red;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
background:red;
color:black;
}

/* PANEL */
.panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

.panel h2{
margin-bottom:20px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:20px;
cursor:pointer;
}

/* GLITCH */
.glitch{
animation:glitch 0.4s infinite;
}

@keyframes glitch{
0%{transform:translate(1px,1px);}
25%{transform:translate(-1px,-2px);}
50%{transform:translate(-2px,1px);}
75%{transform:translate(2px,2px);}
100%{transform:translate(1px,-1px);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<h1 class="glitch">☠️ THE PAIN MD ☠️</h1>

<button class="btn" onclick="location.href='qr.html'">QR CODE</button>
<button class="btn" onclick="location.href='pair.html'">PAIR CODE</button>

<button class="btn" onclick="openPanel('resources')">RESOURCES</button>
<button class="btn" onclick="openPanel('deploy')">DEPLOY</button>
<button class="btn" onclick="openPanel('info')">INFO</button>
</div>

<!-- RESOURCES -->
<div id="resources" class="panel">
<div class="close" onclick="closePanel()">✖</div>
<h2>📚 RESOURCES</h2>

<button class="btn" onclick="openLink('https://github.com/The-Pain-01/The-Pain')">GITHUB</button>
<button class="btn" onclick="openLink('https://whatsapp.com/channel/0029Vb7FTvDICVfgeK27ul2S')">CHANNEL</button>
<button class="btn" onclick="openLink('https://the-pain-md-session-id-zjus.onrender.com')">BACKEND</button>

</div>

<!-- DEPLOY -->
<div id="deploy" class="panel">
<div class="close" onclick="closePanel()">✖</div>
<h2>🚀 DEPLOY</h2>

<button class="btn" onclick="openLink('https://dashboard.katabump.com')">KATABUMP</button>
<button class="btn" onclick="openLink('https://discord.com')">DISCORD</button>
<button class="btn" onclick="openLink('https://heroku.com')">HEROKU</button>
<button class="btn" onclick="openLink('https://teoheberg.com')">MANAGER TEOHEBERG</button>

</div>

<!-- INFO -->
<div id="info" class="panel">
<div class="close" onclick="closePanel()">✖</div>

<h2 class="glitch">☠️ SYSTEM INFO ☠️</h2>

<p style="max-width:300px;text-align:center;">
OWNER:<br><br>
⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄<br><br>

Un esprit froid.  
Calculateur.  
Silencieux mais dangereux.<br><br>

BOT:<br>
THE PAIN MD<br><br>

Un système conçu pour contrôler, connecter et dominer.<br><br>

⚠️ Ce système n’est pas fait pour les faibles.
</p>

</div>

<script>
// MATRIX
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

const letters="THEPAIN0123456789☠️";
const arr=letters.split("");
const drops=[];

for(let i=0;i<256;i++)drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="red";
ctx.font="14px monospace";

for(let i=0;i<drops.length;i++){
const text=arr[Math.floor(Math.random()*arr.length)];
ctx.fillText(text,i*10,drops[i]*10);

if(drops[i]*10>c.height&&Math.random()>0.975) drops[i]=0;
drops[i]++;
}
}

setInterval(draw,33);

// PANELS
function openPanel(id){
document.getElementById(id).style.display="flex";
}

function closePanel(){
document.querySelectorAll('.panel').forEach(p=>p.style.display="none");
}

function openLink(url){
window.open(url);
}
</script>

</body>
</html>
