<!DOCTYPE html>
<html>
<head>
<title>PAIR</title>

<style>
body{
margin:0;
background:black;
color:red;
font-family:monospace;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

h1{
font-size:38px;
text-shadow:0 0 20px red;
}

input{
width:85%;
max-width:500px;
padding:20px;
font-size:22px;
margin:20px;
border:2px solid red;
background:black;
color:red;
text-align:center;
}

button{
width:85%;
max-width:500px;
padding:20px;
font-size:22px;
border:2px solid red;
background:black;
color:red;
cursor:pointer;
}

#res{
margin-top:30px;
font-size:32px;
}

.footer{
position:absolute;

}
</style>
</head>

<body>

<h1>☠️ PAIR CODE ☠️</h1>

<input id="num" placeholder="+243XXXXXXXXX">
<button onclick="gen()">GENERATE</button>

<p id="res"></p>

<div class="footer">POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</div>

<script>
async function gen(){
let n=document.getElementById("num").value;
let r=document.getElementById("res");

r.innerHTML="LOADING...";

try{
let data=await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+n);
let j=await data.json();
r.innerHTML=j.code;
}catch{
r.innerHTML="ERROR";
}
}
</script>

</body>
</html>
