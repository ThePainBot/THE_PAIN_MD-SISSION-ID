<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIR - THE PAIN</title>

<style>
body {
  background:black;
  color:red;
  font-family: monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:95%;
  max-width:700px;
  text-align:center;
}

h1 {
  font-size:50px;
}

input {
  width:100%;
  padding:25px;
  font-size:22px;
  margin:15px 0;
  background:black;
  border:2px solid red;
  color:red;
}

button {
  width:100%;
  padding:25px;
  font-size:22px;
  background:black;
  border:2px solid red;
  color:red;
  cursor:pointer;
}

#result {
  margin-top:20px;
  font-size:28px;
}
</style>
</head>

<body>

<div class="container">
  <h1>PAIR SYSTEM</h1>

  <input id="number" placeholder="+277XXXXXXXXX">

  <button onclick="gen()">GENERATE SESSION</button>

  <div id="result"></div>

  <p>POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</p>
</div>

<script>
async function gen(){
  let num = document.getElementById("number").value;

  // 🔥 nettoyage numéro
  num = num.replace(/[^0-9]/g, '');

  if(num.length < 11){
    document.getElementById("result").innerHTML = "❌ NUMERO INVALIDE";
    return;
  }

  document.getElementById("result").innerHTML = "⏳ GENERATING...";

  try {
    let res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number=" + num);
    let data = await res.json();

    if(data.code){
      document.getElementById("result").innerHTML = "✅ CODE: " + data.code;
    } else {
      document.getElementById("result").innerHTML = "❌ ERROR";
    }

  } catch (err){
    document.getElementById("result").innerHTML = "❌ SERVER ERROR";
  }
}
</script>

</body>
</html>
