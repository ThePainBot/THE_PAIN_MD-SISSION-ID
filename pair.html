<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIR - THE PAIN</title>

<style>
body {
  margin:0;
  background:black;
  color:red;
  font-family: monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.container {
  width:95%;
  max-width:700px;
  text-align:center;
}

/* TITLE */
h1 {
  font-size:55px;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:25px;
  font-size:22px;
  margin:20px 0;
  background:black;
  border:3px solid red;
  color:red;
  text-align:center;
}

/* BUTTON */
button {
  width:100%;
  padding:25px;
  font-size:22px;
  background:black;
  border:3px solid red;
  color:red;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:red;
  color:black;
}

/* RESULT */
#result {
  margin-top:30px;
  font-size:26px;
  word-break: break-word;
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>☠️ PAIR SYSTEM ☠️</h1>

  <input id="number" placeholder="+243XXXXXXXXX">

  <button onclick="gen()">⚡ GENERATE SESSION ⚡</button>

  <div id="result"></div>

  <div class="footer">
    POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸
  </div>
</div>

<script>
async function gen() {
  const num = document.getElementById("number").value.trim();
  const result = document.getElementById("result");

  if (!num) {
    result.innerHTML = "❌ ENTRE TON NUMÉRO";
    return;
  }

  result.innerHTML = "⏳ GÉNÉRATION...";

  try {
    const res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number=" + encodeURIComponent(num));

    const data = await res.json();

    if (data.code) {
      result.innerHTML = "✅ CODE : " + data.code;
    } else {
      result.innerHTML = "❌ ERREUR";
    }

  } catch (err) {
    result.innerHTML = "❌ BACKEND OFF OU ERREUR";
  }
}
</script>

</body>
</html>
