<!DOCTYPE html>
<html>
<head>
<title>PAIR</title>

<style>
body{
margin:0;
background:black;
color:red;
font-family:monospace;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

/* TITLE */
h1{
font-size:38px;
margin-bottom:20px;
text-shadow:0 0 20px red;
}

/* INPUT */
input{
width:85%;
max-width:500px;
padding:20px;
font-size:22px;
margin-bottom:20px;
border:2px solid red;
background:black;
color:red;
text-align:center;
}

/* BUTTON */
button{
width:85%;
max-width:500px;
padding:20px;
font-size:22px;
border:2px solid red;
background:black;
color:red;
cursor:pointer;
}

button:hover{
background:red;
color:black;
}

/* RESULT */
#res{
margin-top:30px;
font-size:32px;
font-weight:bold;
text-align:center;
word-break:break-word;
}

/* GLITCH */
.glitch{
animation:glitch 0.4s infinite;
}

@keyframes glitch{
0%{transform:translate(1px,1px);}
25%{transform:translate(-1px,-2px);}
50%{transform:translate(-2px,1px);}
75%{transform:translate(2px,2px);}
100%{transform:translate(1px,-1px);}
}
</style>
</head>

<body>

<h1 class="glitch">☠️ PAIR CODE ☠️</h1>

<input id="num" placeholder="+243XXXXXXXXX">

<button onclick="gen()">GENERATE SESSION</button>

<p id="res"></p>

<script>
async function gen(){
let n=document.getElementById("num").value;
let r=document.getElementById("res");

r.innerHTML="LOADING...";

try{
let data=await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+n);
let j=await data.json();
r.innerHTML=j.code;
}catch{
r.innerHTML="ERROR";
}
}
</script>

</body>
</html>
