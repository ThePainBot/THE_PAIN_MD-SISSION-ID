<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PAIN MD - PAIR</title>

<style>
* {
  box-sizing: border-box;
  font-family: monospace;
}

body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  color: red;
}

/* CARD */
.card {
  width: 95%;
  max-width: 650px;
  padding: 40px;
  border: 2px solid red;
  text-align: center;
  box-shadow: 0 0 40px red;
}

/* TITLE */
h2 {
  font-size: 40px;
  margin-bottom: 10px;
}

/* INPUT */
input {
  width: 100%;
  padding: 20px;
  font-size: 22px;
  background: black;
  border: 2px solid red;
  color: red;
  margin-top: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 20px;
  font-size: 22px;
  margin-top: 20px;
  background: black;
  border: 2px solid red;
  color: red;
  cursor: pointer;
}

button:hover {
  background: red;
  color: black;
}

/* RESULT */
#pair {
  margin-top: 25px;
  font-size: 22px;
}

/* COPY */
.copy-btn {
  margin-top: 15px;
  padding: 15px;
  border: 2px solid red;
  background: black;
  color: red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

<h2>☠ THE PAIN MD ☠</h2>

<p>ENTER NUMBER • GENERATE SESSION</p>

<input type="text" id="number" placeholder="+243XXXXXXXXX">

<button onclick="gen()">GENERATE</button>

<div id="pair"></div>

<p>POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</p>

</div>

<script>
async function gen() {
  let num = document.getElementById("number").value;
  let result = document.getElementById("pair");

  if (!num || num.replace(/[^0-9]/g, "").length < 11) {
    result.innerHTML = "❌ INVALID NUMBER";
    return;
  }

  result.innerHTML = "⏳ GENERATING SESSION...";

  try {
    let res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number=" + num);
    let data = await res.json();

    let code = data.code || "ERROR";

    result.innerHTML = `
      ☠️ SESSION KEY ☠️ <br><br>
      ${code}
      <br><br>
      <button class="copy-btn" onclick="copy('${code}')">COPY</button>
    `;
  } catch (err) {
    result.innerHTML = "❌ CONNECTION ERROR";
  }
}

function copy(text) {
  navigator.clipboard.writeText(text);
  alert("COPIED");
}
</script>

</body>
</html>
