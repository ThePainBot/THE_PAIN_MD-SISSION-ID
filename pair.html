<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIR - THE PAIN</title>

<style>
body{
  background:black;
  color:red;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:95%;
  max-width:600px;
  text-align:center;
}

h1{
  font-size:50px;
}

input{
  width:100%;
  padding:25px;
  font-size:22px;
  margin:20px 0;
  border:2px solid red;
  background:black;
  color:red;
}

button{
  width:100%;
  padding:25px;
  font-size:22px;
  border:2px solid red;
  background:black;
  color:red;
  cursor:pointer;
}

#result{
  margin-top:25px;
  font-size:28px;
}
</style>
</head>

<body>

<div class="container">
<h1>PAIR SYSTEM</h1>

<input id="number" placeholder="+243XXXXXXXXX">

<button onclick="gen()">GENERATE</button>

<div id="result"></div>

<p>POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸</p>
</div>

<script>
async function gen(){
  let num = document.getElementById("number").value;

  if(!num){
    alert("Enter number");
    return;
  }

  document.getElementById("result").innerHTML = "LOADING...";

  try{
    let res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+encodeURIComponent(num));
    let data = await res.json();

    document.getElementById("result").innerHTML = data.code || "ERROR";
  }catch{
    document.getElementById("result").innerHTML = "SERVER ERROR";
  }
}
</script>

</body>
</html>
