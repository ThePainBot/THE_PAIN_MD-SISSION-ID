<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIR - THE PAIN</title>

<style>
body {
  background:black;
  color:red;
  font-family: monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* CONTAINER */
.container {
  width:95%;
  max-width:700px;
  text-align:center;
}

/* TITRE */
h1 {
  font-size:60px;
  margin-bottom:20px;
  text-shadow:0 0 20px red;
}

/* INPUT */
input {
  width:100%;
  padding:28px;
  font-size:24px;
  margin:25px 0;
  background:black;
  border:2px solid red;
  color:red;
  text-align:center;
}

/* BUTTON */
button {
  width:100%;
  padding:28px;
  font-size:24px;
  background:black;
  border:2px solid red;
  color:red;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:red;
  color:black;
  box-shadow:0 0 20px red;
}

/* RESULT */
#result {
  margin-top:30px;
  font-size:28px;
  word-break:break-word;
}

/* LOADER */
.loader {
  border:4px solid black;
  border-top:4px solid red;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* FOOTER */
.footer {
  margin-top:40px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>☠️ PAIR SYSTEM ☠️</h1>

  <input id="number" placeholder="+243XXXXXXXXX">

  <button onclick="gen()">GENERATE SESSION</button>

  <div id="result"></div>

  <div class="footer">
    POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸
  </div>
</div>

<script>
async function gen(){
  const input = document.getElementById("number");
  const result = document.getElementById("result");

  let num = input.value.trim();

  // 🔥 VALIDATION
  if(!num){
    result.innerHTML = "❌ ENTER NUMBER";
    return;
  }

  // 🔥 nettoyage numéro
  num = num.replace(/[^0-9+]/g, "");

  // 🔥 LOADING UI
  result.innerHTML = '<div class="loader"></div>';

  try{
    const res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number=" + encodeURIComponent(num));

    // 🔥 si backend crash
    if(!res.ok){
      result.innerHTML = "❌ BACKEND ERROR";
      return;
    }

    const data = await res.json();

    if(data.code){
      result.innerHTML = "🔥 SESSION:<br><br>" + data.code;
    }else{
      result.innerHTML = "❌ INVALID RESPONSE";
    }

  }catch(e){
    result.innerHTML = "❌ SERVER OFFLINE";
  }
}
</script>

</body>
</html>
