<!DOCTYPE html>
<html>
<head>
<title>PAIR</title>
<style>
body{
background:black;
color:red;
font-family:monospace;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

input,button{
padding:15px;
margin:10px;
font-size:18px;
border:1px solid red;
background:black;
color:red;
}
</style>
</head>

<body>

<div>
<h2>PAIR CODE</h2>

<input id="num" placeholder="+243XXXXXXXXX">
<br>
<button onclick="gen()">GENERATE</button>

<p id="res"></p>
</div>

<script>
async function gen(){
let n=document.getElementById("num").value;
let r=document.getElementById("res");

r.innerHTML="LOADING...";

try{
let data=await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+n);
let j=await data.json();
r.innerHTML=j.code;
}catch{
r.innerHTML="ERROR";
}
}
</script>

</body>
</html>
