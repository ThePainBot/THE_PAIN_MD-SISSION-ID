<!DOCTYPE html>
<html>
<head>
<title>PAIR</title>

<style>
body{
margin:0;
background:black;
color:red;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
text-align:center;
}

input{
width:260px;
padding:18px;
font-size:20px;
margin:10px;
border:2px solid red;
background:black;
color:red;
}

button{
width:280px;
padding:18px;
font-size:20px;
border:2px solid red;
background:black;
color:red;
cursor:pointer;
}

#res{
margin-top:20px;
font-size:22px;
}
</style>
</head>

<body>

<div class="box">
<h2>PAIR CODE</h2>

<input id="num" placeholder="+243XXXXXXXXX">

<button onclick="gen()">GENERATE</button>

<p id="res"></p>
</div>

<script>
async function gen(){
let n=document.getElementById("num").value;
let r=document.getElementById("res");

r.innerHTML="LOADING...";

try{
let data=await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+n);
let j=await data.json();
r.innerHTML=j.code;
}catch{
r.innerHTML="ERROR";
}
}
</script>

</body>
</html>
