<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PAIR - THE PAIN</title>

<style>
body{
  margin:0;
  background:black;
  color:red;
  font-family: monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* MATRIX RAIN */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  width:95%;
  max-width:700px;
  text-align:center;
}

/* TITRE GLITCH */
h1{
  font-size:60px;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px red;}
  50%{text-shadow:-2px -2px crimson;}
  100%{text-shadow:2px -2px darkred;}
}

/* INPUT */
input{
  width:100%;
  padding:25px;
  font-size:22px;
  margin:20px 0;
  background:black;
  border:2px solid red;
  color:red;
}

/* BUTTON */
button{
  width:100%;
  padding:25px;
  font-size:24px;
  background:black;
  border:2px solid red;
  color:red;
  cursor:pointer;
}

button:hover{
  background:red;
  color:black;
}

/* RESULT */
#result{
  margin-top:25px;
  font-size:26px;
  word-break:break-all;
}

.footer{
  margin-top:30px;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>☠️ PAIR SYSTEM ☠️</h1>

  <input id="number" placeholder="+243XXXXXXXXX">

  <button onclick="gen()">GENERATE SESSION</button>

  <div id="result"></div>

  <div class="footer">
    POWERED BY 🩸 ⏤͟͟͞𝐓𝐇𝐄 ➪ 𝐏𝐀𝐈𝐍 ᭄ 🩸
  </div>
</div>

<script>
// MATRIX RAIN
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "THEPAIN0123456789☠️";
const fontSize = 14;
const columns = canvas.width/fontSize;

const drops = Array.from({length:columns}).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.font=fontSize+"px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);

    if(y*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw,33);

// FETCH
async function gen(){
  let num = document.getElementById("number").value;

  document.getElementById("result").innerHTML="LOADING...";

  try{
    let res = await fetch("https://the-pain-md-session-id-zjus.onrender.com/code?number="+num);
    let data = await res.json();

    document.getElementById("result").innerHTML = data.code || "ERROR";
  }catch{
    document.getElementById("result").innerHTML = "SERVER ERROR";
  }
}
</script>

</body>
</html>
